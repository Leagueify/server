version: "3.9"

services:
  traefik:
    container_name: leagueify-traefik
    image: traefik:v2.9.6
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.api.address=:8888
    ports:
      - 80:8888
      - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  leagueify-server:
    container_name: leagueify-server
    image: ghcr.io/leagueify/server:latest
    environment:
      DATABASE_URI: postgresql://leagueify:password@leagueify-database:5432/leagueify?schema=public
      DATABASE_USER: leagueify
      DATABASE_PASS: password
      PASSWORD_PEPPER: NeverGonnaGiveYouUp
    labels:
      - traefik.enable=true
      - traefik.http.routers.leagueify-server.entrypoints=api
      - traefik.http.routers.leagueify-server.rule=PathPrefix(`/`)
      - traefik.http.middlewares.leagueify-server.ratelimit.average=100
    expose:
      - 8888
    restart: always

  leagueify-database:
    container_name: leagueify-database
    image: postgres:15.2-alpine3.17
    environment:
      POSTGRES_USER: leagueify
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leagueify
    expose:
      - 5432
    volumes:
      - database:/data/db
    restart: always

volumes:
  database: